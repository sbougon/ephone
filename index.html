<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Emergency">
  <title>Emergency Call</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── SCREEN 1: SETUP ── -->
  <div id="screen-setup" class="screen active">
    <div class="setup-inner">
      <h1 class="app-title">Emergency Call</h1>

      <div class="photo-upload-area" id="photo-upload-area">
        <div class="setup-photo-circle">
          <img id="setup-photo-img" src="" alt="">
          <div id="setup-photo-placeholder" class="photo-ph">
            <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="40" height="40">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4
                       7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6
                       1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
            <span>Tap to add photo</span>
          </div>
        </div>
        <input type="file" id="photo-input" accept="image/*">
      </div>

      <div class="setup-fields">
        <div class="field-group">
          <label>Name shown on call screen</label>
          <input type="text" id="contact-name" value="Mom" maxlength="20">
        </div>

        <div class="field-group">
          <label>Delay before call rings</label>
          <div class="delay-row">
            <div class="delay-unit">
              <input type="number" id="delay-min" value="0" min="0" max="59">
              <span>min</span>
            </div>
            <div class="delay-unit">
              <input type="number" id="delay-sec" value="30" min="0" max="59">
              <span>sec</span>
            </div>
          </div>
        </div>
      </div>

      <button id="arm-btn" class="arm-btn">ARM</button>
      <p class="setup-note">Keep the app open after arming.<br>Screen will stay on automatically.</p>
    </div>
  </div>

  <!-- ── SCREEN 2: WAITING (fake lock screen) ── -->
  <div id="screen-waiting" class="screen">
    <div class="lock-body">
      <div class="lock-time" id="lock-time">12:00</div>
      <div class="lock-date" id="lock-date">Wednesday, January 1</div>
    </div>
    <button id="cancel-btn" class="cancel-btn">Cancel</button>
  </div>

  <!-- ── SCREEN 3: INCOMING CALL ── -->
  <div id="screen-call" class="screen">

    <!-- Contact header: top-left photo + name -->
    <div class="ios-header">
      <div class="ios-photo-wrap">
        <img id="call-photo-img" src="" alt="">
        <div id="call-photo-ph" class="ios-avatar">
          <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="36" height="36">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4
                     7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6
                     1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
      </div>
      <div class="ios-info">
        <div class="ios-sub">mobile</div>
        <div class="ios-name" id="call-name">Mom</div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="ios-spacer"></div>

    <!-- Bottom buttons -->
    <div class="ios-btn-section">

      <!-- Row 1: ghost buttons -->
      <div class="ios-btn-row">
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </div>
          <span>Message</span>
        </div>
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <path d="M22 5.72l-4.6-3.86-1.29 1.53 4.6 3.86L22 5.72zM7.88 3.39L6.6 1.86 2 5.71l1.29 1.53 4.59-3.85zM12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7zm.5-11H11v6l5.25 3.15.75-1.23-4.5-2.67V9z"/>
            </svg>
          </div>
          <span>Remind Me</span>
        </div>
      </div>

      <!-- Row 2: Decline / Accept -->
      <div class="ios-btn-row">
        <div class="ios-btn-item" id="decline-btn">
          <div class="ios-color-circle ios-red">
            <svg viewBox="0 0 24 24" fill="white" width="34" height="34" style="transform:rotate(135deg)">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36
                       1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45
                       1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1
                       1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"/>
            </svg>
          </div>
          <span>Decline</span>
        </div>
        <div class="ios-btn-item" id="accept-btn">
          <div class="ios-color-circle ios-green">
            <svg viewBox="0 0 24 24" fill="white" width="34" height="34">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36
                       1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45
                       1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1
                       1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"/>
            </svg>
          </div>
          <span>Accept</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── SCREEN 4: ACTIVE CALL ── -->
  <div id="screen-active" class="screen">

    <!-- Contact header: top-left photo + timer + name -->
    <div class="ios-header">
      <div class="ios-photo-wrap">
        <img id="active-photo-img" src="" alt="">
        <div id="active-photo-ph" class="ios-avatar">
          <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="36" height="36">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4
                     7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6
                     1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
      </div>
      <div class="ios-info">
        <div class="ios-sub ios-timer" id="active-dur">00:00</div>
        <div class="ios-name" id="active-name">Mom</div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="ios-spacer"></div>

    <!-- Bottom: 3×2 grid -->
    <div class="ios-btn-section">

      <!-- Row 1: Audio / FaceTime / Mute -->
      <div class="ios-btn-row">
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
          </div>
          <span>Audio</span>
        </div>
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
          </div>
          <span>FaceTime</span>
        </div>
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
            </svg>
          </div>
          <span>Mute</span>
        </div>
      </div>

      <!-- Row 2: More / End / Keypad -->
      <div class="ios-btn-row">
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
              <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
            </svg>
          </div>
          <span>More</span>
        </div>
        <div class="ios-btn-item" id="end-btn">
          <div class="ios-color-circle ios-red">
            <svg viewBox="0 0 24 24" fill="white" width="34" height="34" style="transform:rotate(135deg)">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36
                       1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45
                       1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1
                       1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"/>
            </svg>
          </div>
          <span>End</span>
        </div>
        <div class="ios-btn-item">
          <div class="ios-ghost-circle">
            <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
              <circle cx="6" cy="6" r="1.3"/><circle cx="12" cy="6" r="1.3"/><circle cx="18" cy="6" r="1.3"/>
              <circle cx="6" cy="12" r="1.3"/><circle cx="12" cy="12" r="1.3"/><circle cx="18" cy="12" r="1.3"/>
              <circle cx="6" cy="18" r="1.3"/><circle cx="12" cy="18" r="1.3"/><circle cx="18" cy="18" r="1.3"/>
            </svg>
          </div>
          <span>Keypad</span>
        </div>
      </div>

    </div>
  </div>

  <audio id="ringtone" src="ringtone.mp3" loop preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
